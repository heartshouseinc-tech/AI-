<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AI図面作成 v3 Pro</title>
<style>
:root{
  --bg:#f0f5fa;--bg2:#e2ecf6;--bg3:#ccdaea;
  --card:#fff;--bdr:#afc8e0;
  --tx:#0e2030;--tx2:#2a4860;--tx3:#5078a0;
  --a:#1268b0;--a2:#0a9458;--a3:#c84010;--a4:#7010b0;
  --warn:#b87000;--gold:#c89400;
  --sh:0 2px 8px rgba(16,60,110,.10);--sh2:0 6px 22px rgba(16,60,110,.18);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;font-size:13px;display:flex;flex-direction:column;}

/* ── LOGIN ── */
#LS{display:none;position:fixed;inset:0;background:linear-gradient(145deg,#0a1e32,#164578 55%,#0a2e14);align-items:center;justify-content:center;padding:20px;z-index:9999;}
#LS.on{display:flex;}
.lc{background:rgba(255,255,255,.97);border-radius:18px;padding:30px 24px;width:min(360px,100%);box-shadow:0 24px 60px rgba(0,0,0,.45);}
.ll{text-align:center;margin-bottom:20px;}.ll .li{font-size:44px;display:block;margin-bottom:8px;}
.ll h1{color:#0e2030;font-size:17px;font-weight:700;}.ll p{color:#507898;font-size:11px;margin-top:3px;}
.lf{margin-bottom:12px;}.lf label{display:block;font-size:11px;font-weight:700;color:#2a4860;margin-bottom:4px;}
.lf input{width:100%;padding:11px 12px;border:2px solid #afc8e0;border-radius:8px;font-size:15px;outline:none;background:#f0f8ff;font-family:inherit;}
.lf input:focus{border-color:var(--a);}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,#1268b0,#0a4880);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.lerr{color:#a01808;font-size:11px;text-align:center;margin-top:8px;min-height:14px;}

/* ── APP BAR ── */
#AB{background:linear-gradient(135deg,#0a1e32,#164578);color:#cce8ff;height:48px;display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.28);}
#AB .logo{font-size:15px;font-weight:700;flex:1;}
#AB .badge{background:rgba(0,200,100,.18);color:#40ffb0;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;border:1px solid rgba(0,200,100,.3);}
.ab{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#cce8ff;font-size:11px;padding:4px 9px;border-radius:12px;cursor:pointer;}
.ab:active{background:rgba(255,255,255,.22);}

/* ── DRAW TABS ── */
#DT{background:#fff;border-bottom:2px solid var(--bdr);display:flex;flex-shrink:0;}
.dtab{flex:1;padding:9px 2px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--tx3);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.dtab.on{color:var(--a);border-bottom-color:var(--a);background:#eef6ff;}

/* ── MAIN LAYOUT (flex row) ── */
#MAIN{flex:1;display:flex;overflow:hidden;}

/* ── LEFT PANEL ── */
#LP{width:220px;flex-shrink:0;background:var(--card);border-right:2px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
#LP.collapsed{width:0;border:none;}
.lp-tabs{display:flex;border-bottom:2px solid var(--bdr);}
.lpt{flex:1;padding:7px 2px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;background:var(--bg2);}
.lpt.on{color:var(--a);border-bottom-color:var(--a);background:#fff;}
.lp-body{flex:1;overflow-y:auto;padding:8px;}
.lp-body::-webkit-scrollbar{width:3px;}.lp-body::-webkit-scrollbar-thumb{background:var(--bdr);}

/* Settings inputs */
.s-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.s-label{font-size:10px;font-weight:700;color:var(--tx3);white-space:nowrap;}
.s-input{padding:5px 7px;border:1.5px solid var(--bdr);border-radius:6px;background:var(--bg2);color:var(--tx);font-size:12px;outline:none;font-family:'Share Tech Mono',monospace;width:70px;}
.s-input:focus{border-color:var(--a);}
.mb-btn{padding:4px 10px;border:1.5px solid var(--bdr);border-radius:12px;background:var(--bg2);color:var(--tx2);font-size:11px;font-weight:700;cursor:pointer;}
.mb-btn.on{border-color:var(--a);background:#ddeeff;color:var(--a);}

/* Part categories */
.cat-title{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1px;padding:6px 0 4px;border-bottom:1px solid var(--bdr);margin-bottom:6px;}
.part-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;}
.part-chip{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:7px;padding:6px 4px;text-align:center;cursor:pointer;transition:all .18s;user-select:none;}
.part-chip:active{transform:scale(.94);border-color:var(--a);}
.part-chip .pi{font-size:16px;display:block;margin-bottom:2px;}
.part-chip .pl{font-size:9px;font-weight:700;color:var(--tx2);line-height:1.3;}

/* AI search bar in panel */
.ai-bar{background:#eef6ff;border:1.5px solid #90c0e8;border-radius:8px;padding:7px;margin-bottom:8px;}
.ai-bar-top{display:flex;gap:5px;margin-bottom:5px;}
.ai-ta{flex:1;background:#fff;border:1px solid #90c0e8;border-radius:6px;padding:5px 7px;font-size:12px;resize:none;outline:none;min-height:32px;max-height:70px;font-family:inherit;color:var(--tx);}
.ai-ta:focus{border-color:var(--a);}
.mic-btn{width:32px;height:32px;border:1px solid #90c0e8;border-radius:6px;background:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mic-btn.rec{border-color:#c02020;background:#fff0f0;animation:pulse .8s infinite;}
.ai-bar-btns{display:flex;gap:4px;}
.ai-gb{flex:1;padding:5px 6px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;color:#fff;}
.ai-gb.gen{background:linear-gradient(135deg,#1268b0,#0a4880);}
.ai-gb.srch{background:linear-gradient(135deg,#0a9458,#076038);}

/* ── CANVAS AREA ── */
#CA{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* Toolbar */
#TB{background:#fff;border-bottom:2px solid var(--bdr);padding:5px 8px;display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;align-items:center;flex-shrink:0;}
#TB::-webkit-scrollbar{height:0;}
.tbtn{padding:5px 9px;border:1.5px solid var(--bdr);border-radius:12px;background:var(--bg2);color:var(--tx2);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.tbtn.on{border-color:var(--a);background:#ddeeff;color:var(--a);}
.tbtn.lock{border-color:var(--a2);color:var(--a2);}
.tbtn.del{border-color:#e09090;color:#a01818;}
.tb-sep{width:1px;height:24px;background:var(--bdr);flex-shrink:0;margin:0 2px;}
.floor-sw{display:flex;border-radius:12px;overflow:hidden;border:1.5px solid var(--bdr);flex-shrink:0;}
.fsw{padding:4px 12px;border:none;background:var(--bg2);color:var(--tx3);font-size:11px;font-weight:700;cursor:pointer;}
.fsw.on{background:var(--a);color:#fff;}

/* Canvas wrapper */
#CW{flex:1;position:relative;overflow:hidden;background:#dce8f0;touch-action:none;cursor:crosshair;}
canvas#CV{display:block;touch-action:none;}
.cv-scalebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.88);border:1px solid var(--bdr);border-radius:10px;padding:3px 12px;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--tx3);pointer-events:none;}
.cv-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(16,60,110,.8);color:#fff;border-radius:12px;padding:4px 14px;font-size:11px;pointer-events:none;white-space:nowrap;display:none;}

/* ── PROPS PANEL (bottom) ── */
#PP{background:#fff;border-top:2px solid var(--bdr);padding:7px 10px;flex-shrink:0;display:none;max-height:140px;overflow-y:auto;}
.pp-title{font-size:11px;font-weight:700;color:var(--a);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;}
.pp-field{display:flex;flex-direction:column;gap:2px;}
.pp-field label{font-size:10px;color:var(--tx3);}
.pp-field input,.pp-field select{padding:4px 7px;border:1.5px solid var(--bdr);border-radius:6px;background:var(--bg2);color:var(--tx);font-size:12px;outline:none;font-family:'Share Tech Mono',monospace;}
.pp-field input:focus,.pp-field select:focus{border-color:var(--a);}
.pp-btns{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.pp-btn{padding:4px 10px;border:1.5px solid var(--bdr);border-radius:10px;background:var(--bg2);color:var(--tx2);font-size:11px;font-weight:700;cursor:pointer;}
.pp-btn:active{background:var(--a);color:#fff;border-color:var(--a);}
.pp-btn.del{border-color:#e09090;color:#a01818;}
.pp-btn.lock{border-color:var(--a2);color:var(--a2);}

/* ── PART MODAL ── */
#PM{display:none;position:fixed;inset:0;z-index:800;background:rgba(8,20,36,.6);align-items:flex-end;backdrop-filter:blur(3px);}
#PM.on{display:flex;}
.pm-inner{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:80dvh;overflow-y:auto;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom));}
.pm-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pm-ico{font-size:26px;}.pm-title{font-size:15px;font-weight:700;flex:1;}
.pm-close{background:none;border:none;font-size:22px;color:var(--tx3);cursor:pointer;}
.pm-section{margin-bottom:12px;}
.pm-sec-title{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--bdr);}
.preset-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.pre-btn{padding:5px 10px;border:1.5px solid var(--bdr);border-radius:10px;background:var(--bg2);color:var(--tx2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Share Tech Mono',monospace;}
.pre-btn.on{border-color:var(--a);background:#ddeeff;color:var(--a);}
.custom-row{display:flex;gap:6px;align-items:center;margin-top:4px;}
.custom-row input{flex:1;padding:6px 8px;border:1.5px solid var(--bdr);border-radius:7px;background:var(--bg2);color:var(--tx);font-size:13px;outline:none;font-family:'Share Tech Mono',monospace;}
.custom-row input:focus{border-color:var(--a);}
.custom-row .cu{font-size:10px;color:var(--tx3);}
/* 3x3 Direction grid */
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:210px;margin:0 auto 10px;}
.dc{height:48px;border:1.5px solid var(--bdr);border-radius:7px;background:var(--bg2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--tx2);gap:1px;}
.dc:active,.dc.on{border-color:var(--a);background:#ddeeff;color:var(--a);}
.dc .di{font-size:15px;}
.place-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1268b0,#0a4880);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(18,90,176,.3);}

/* ── AI PANEL ── */
#AIP{display:none;position:fixed;inset:0;z-index:700;align-items:flex-end;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);}
#AIP.on{display:flex;}
.aip-inner{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:70dvh;display:flex;flex-direction:column;padding-bottom:max(8px,env(safe-area-inset-bottom));}
.aip-head{background:linear-gradient(135deg,#164578,#0a2e14);color:#cce8ff;padding:9px 13px;border-radius:18px 18px 0 0;display:flex;align-items:center;gap:7px;}
.aip-head h3{font-size:13px;font-weight:700;flex:1;}
.amode{padding:3px 7px;border:1px solid rgba(255,255,255,.2);border-radius:9px;font-size:9px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;background:rgba(255,255,255,.06);}
.amode.on{background:rgba(255,255,255,.22);color:#fff;}
.aip-q{display:flex;gap:3px;flex-wrap:wrap;padding:5px 9px;background:#eef6ff;border-bottom:1px solid var(--bdr);}
.aqb{padding:3px 8px;border:1px solid #90c0e0;border-radius:9px;background:#fff;color:#1a4a80;font-size:10px;cursor:pointer;}
.aqb:active{background:var(--a);color:#fff;}
.aip-msgs{flex:1;overflow-y:auto;padding:7px 10px;display:flex;flex-direction:column;gap:6px;background:var(--bg);}
.amsg{display:flex;gap:5px;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.amsg.u{flex-direction:row-reverse;}
.abub{max-width:88%;padding:7px 11px;border-radius:12px;font-size:12px;line-height:1.6;white-space:pre-wrap;}
.amsg.b .abub{background:#fff;border:1px solid var(--bdr);border-radius:4px 12px 12px 12px;box-shadow:var(--sh);}
.amsg.u .abub{background:linear-gradient(135deg,#164578,#0a3a60);color:#fff;border-radius:12px 4px 12px 12px;}
.aav{width:22px;height:22px;border-radius:50%;background:#dceaf8;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.dots{display:flex;gap:3px;padding:2px 0;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--a);animation:dt .9s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dt{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.aip-inp{display:flex;gap:5px;padding:6px 9px;border-top:1px solid var(--bdr);background:#fff;}
.aip-ta{flex:1;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:8px;padding:6px 9px;font-size:13px;resize:none;outline:none;max-height:70px;min-height:34px;font-family:inherit;}
.aip-ta:focus{border-color:var(--a);}
.aip-send{background:linear-gradient(135deg,#1268b0,#0a4880);color:#fff;border:none;border-radius:8px;width:40px;height:40px;font-size:16px;cursor:pointer;flex-shrink:0;}

/* FAB */
.fab{position:fixed;bottom:16px;right:13px;z-index:500;width:50px;height:50px;border-radius:50%;border:none;background:linear-gradient(135deg,#164578,#2468b0);color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(16,80,180,.4);cursor:pointer;display:none;}
.fab:active{transform:scale(.88);}

/* CTX MENU */
.ctx{display:none;position:fixed;background:#fff;border:1.5px solid var(--bdr);border-radius:10px;padding:5px;z-index:900;min-width:145px;box-shadow:var(--sh2);}
.ctx.on{display:block;}
.cxi{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:7px;}
.cxi:hover{background:var(--bg2);}
.cx-sep{border-top:1px solid var(--bdr);margin:3px 0;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#0e2030;color:#cce8ff;border-radius:16px;padding:7px 16px;font-size:12px;font-weight:600;z-index:9500;transition:transform .22s;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.3);}
.toast.on{transform:translateX(-50%) translateY(0);}

/* LOADING */
.ld{display:none;position:fixed;inset:0;background:rgba(6,18,30,.84);z-index:9200;align-items:center;justify-content:center;flex-direction:column;gap:12px;backdrop-filter:blur(4px);}
.ld.on{display:flex;}
.lr{width:48px;height:48px;border:4px solid rgba(255,255,255,.1);border-top-color:#48c8ff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{color:#78d8ff;font-size:13px;font-weight:600;}.ls{color:#4888a8;font-size:11px;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>

<!-- Firebase SDK -->
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const cfg={apiKey:"AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",authDomain:"kensetsu-nippo-842a2.firebaseapp.com",projectId:"kensetsu-nippo-842a2",storageBucket:"kensetsu-nippo-842a2.firebasestorage.app",messagingSenderId:"702880974315",appId:"1:702880974315:web:985321dc9180046629c5ae"};
const app=initializeApp(cfg);const auth=getAuth(app);const db=getFirestore(app);
window.__fb={auth,db,signInWithEmailAndPassword,signOut,onAuthStateChanged,doc,setDoc,getDoc,serverTimestamp};
window.dispatchEvent(new Event('fbReady'));
</script>
<script>function fb(){return window.__fb;}</script>

<!-- LOGIN -->
<div id="LS" class="on">
  <div class="lc">
    <div class="ll"><span class="li">🏗️</span><h1>AI図面作成 Pro v3</h1><p>Gemini 2.5 Flash × Firebase</p></div>
    <div class="lf"><label>メールアドレス</label><input type="email" id="lE" autocomplete="email" placeholder="example@company.com"></div>
    <div class="lf"><label>パスワード</label><input type="password" id="lP" autocomplete="current-password" placeholder="パスワード"></div>
    <div class="lerr" id="lErr"></div>
    <button class="lbtn" onclick="doLogin()">🔑 ログイン</button>
  </div>
</div>

<!-- APP BAR -->
<div id="AB" style="display:none;">
  <span class="logo">🏗️ AI図面Pro</span>
  <span class="badge">Gemini 2.5 Flash</span>
  <button class="ab" onclick="toggleLP()">☰</button>
  <button class="fab" id="fabAI" onclick="openAI()" style="position:static;width:auto;height:auto;border-radius:12px;font-size:11px;padding:4px 9px;box-shadow:none;">🤖 AI</button>
  <button class="ab" onclick="doLogout()">↩</button>
</div>

<!-- DRAW TABS -->
<div id="DT" style="display:none;">
  <div class="dtab on" id="dt0" onclick="switchDT(0)">🏠 平面図</div>
  <div class="dtab" id="dt1" onclick="switchDT(1)">🏗️ 構造図<span style="font-size:8px;color:var(--a3);margin-left:2px;">近日</span></div>
  <div class="dtab" id="dt2" onclick="switchDT(2)">📋 リスト</div>
</div>

<!-- MAIN -->
<div id="MAIN" style="display:none;">

  <!-- LEFT PANEL -->
  <div id="LP">
    <div class="lp-tabs">
      <div class="lpt on" id="lpt0" onclick="switchLP(0)">設定</div>
      <div class="lpt" id="lpt1" onclick="switchLP(1)">部屋</div>
      <div class="lpt" id="lpt2" onclick="switchLP(2)">部品</div>
    </div>
    <div class="lp-body" id="lpBody"><!-- filled by JS --></div>
  </div>

  <!-- CANVAS AREA -->
  <div id="CA">
    <!-- Toolbar -->
    <div id="TB">
      <div class="floor-sw">
        <button class="fsw on" id="f1sw" onclick="switchFloor(1)">1F</button>
        <button class="fsw" id="f2sw" onclick="switchFloor(2)">2F</button>
      </div>
      <div class="tb-sep"></div>
      <button class="tbtn on" id="t_sel" onclick="setTool('sel')">↖ 選択</button>
      <button class="tbtn" id="t_move" onclick="setTool('move')">✥ 移動</button>
      <button class="tbtn lock" id="t_lock" onclick="lockSelected()">🔒 固定</button>
      <button class="tbtn" id="t_unlk" onclick="unlockAll()">🔓 全解除</button>
      <div class="tb-sep"></div>
      <button class="tbtn" id="t_door" onclick="setTool('door')">🚪</button>
      <button class="tbtn" id="t_win" onclick="setTool('win')">🪟</button>
      <button class="tbtn" id="t_col" onclick="setTool('col')">⬛</button>
      <button class="tbtn" id="t_wall" onclick="setTool('wall')">▬</button>
      <div class="tb-sep"></div>
      <button class="tbtn del" id="t_del" onclick="setTool('del')">🗑</button>
      <div style="margin-left:auto;display:flex;gap:3px;">
        <button class="tbtn" onclick="undo()">↩ 戻す</button>
        <button class="tbtn" onclick="resetView()">↺</button>
        <button class="tbtn" onclick="exportPNG()">💾</button>
      </div>
    </div>

    <!-- Canvas -->
    <div id="CW">
      <canvas id="CV"></canvas>
      <div class="cv-scalebar" id="scaleBar">1:100 | 900mm grid</div>
      <div class="cv-hint" id="cvHint"></div>

async function callGemini(prompt,useSearch=false){
  const r=await fetch(FB_BASE+'/askClaude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,model:'gemini-2.5-flash',useSearch})});

function buildPartsHTML(){

    buildPMSpans(pt.dw||1800,pt.dh||900,null,null);
  }
  buildPMDir();
  document.getElementById('PM').classList.add('on');
}

function buildPMSpans(defW,defH,wPresets,hPresets){
  const M=getModVal();
  const wPreset=wPresets||(()=>{const a=[];for(let i=1;i<=10;i++)a.push(M*i);return a;})();
  const hPreset=hPresets||(()=>{const a=[];for(let i=1;i<=8;i++)a.push(M*i);return a;})();
  buildPresetBtns('pmWBtns',wPreset,'W',defW);
  buildPresetBtns('pmHBtns',hPreset,'H',defH);
  document.getElementById('pmCW').value='';document.getElementById('pmCH').value='';
  document.getElementById('pmWSection').style.display='block';
  document.getElementById('pmHSection').style.display='block';
}

function buildPresetBtns(containerId,vals,dim,defVal){
  const c=document.getElementById(containerId);c.innerHTML='';
  const closest=vals.reduce((a,b)=>Math.abs(b-defVal)<Math.abs(a-defVal)?b:a,vals[0]);
  vals.forEach(v=>{
    const b=document.createElement('button');
    b.className='pre-btn'+(v===closest?' on':'');
    b.textContent=v;
    b.onclick=()=>{c.querySelectorAll('.pre-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('pmC'+dim).value='';};
    c.appendChild(b);
  });
}

function buildPMDir(){
  const g=document.getElementById('pmDir');g.innerHTML='';
  DIRS.forEach((d,i)=>{
    const cell=document.createElement('div');cell.className='dc'+(i===PM_DATA.dirIdx?' on':'');
    cell.innerHTML=`<span class="di">${d.i}</span><span style="font-size:9px;">${d.l}</span>`;
    cell.onclick=()=>{g.querySelectorAll('.dc').forEach(c=>c.classList.remove('on'));cell.classList.add('on');PM_DATA.dirIdx=i;};
    g.appendChild(cell);
  });
}

function getPMVal(dim){
  const cv=document.getElementById('pmC'+dim).value;
  if(cv&&parseInt(cv)>0)return parseInt(cv);
  const on=document.querySelector('#pm'+dim+'Btns .pre-btn.on');
  return on?parseInt(on.textContent):getModVal()*2;
}

function calcInitPos(w,h){
  const bW=BLDG.w,bD=BLDG.d,M=getModVal();
  const dirs={
    0:{x:M,y:M},1:{x:Math.round((bW-w)/2/M)*M,y:M},2:{x:bW-w-M,y:M},
    3:{x:M,y:Math.round((bD-h)/2/M)*M},4:{x:Math.round((bW-w)/2/M)*M,y:Math.round((bD-h)/2/M)*M},5:{x:bW-w-M,y:Math.round((bD-h)/2/M)*M},
    6:{x:M,y:bD-h-M},7:{x:Math.round((bW-w)/2/M)*M,y:bD-h-M},8:{x:bW-w-M,y:bD-h-M}
  };
  const pos=dirs[PM_DATA.dirIdx]||dirs[4];
  return{x:Math.max(0,pos.x),y:Math.max(0,pos.y)};
}

function confirmPlace(){
  pushHistory();
  const w=getPMVal('W'),h=getPMVal('H');
  const pos=calcInitPos(w,h);
  const floor=PM_DATA.floor;
  let el;
  if(PM_DATA.rt){
    const rt=PM_DATA.rt;
    el={id:ST.nid++,type:'room',floor,roomType:rt.t,label:rt.l,icon:rt.i,x:pos.x,y:pos.y,w,h,color:rt.c||'#e0f0ff',locked:false};
  }else if(PM_DATA.pt){
    const pt=PM_DATA.pt;
    const elType=pt.isSash?'sash':pt.isDoor?'door':pt.isStair?'stair':pt.isSokupan?'sokupan':'part';
    el={id:ST.nid++,type:elType,floor,partType:pt.t,label:pt.l,icon:pt.i,x:pos.x,y:pos.y,w,h:h||120,color:pt.c||'#e0f0ff',locked:false,
        stairType:pt.stairType||null};
  }
  if(el){
    ST.els[floor].push(el);
    ST.selId=el.id;ST.floor=floor;
    renderCV();showPP(el);
    toast(el.icon+' '+el.label+' を配置しました → ドラッグで位置調整');
  }
  document.getElementById('PM').classList.remove('on');
}
function closePM(){document.getElementById('PM').classList.remove('on');}

function addCustomRoom(){
  const n=(document.getElementById('crN')||{}).value?.trim();
  const ic=(document.getElementById('crI')||{}).value?.trim()||'🏠';
  const w=parseInt((document.getElementById('crW')||{}).value)||getModVal()*4;
  const h=parseInt((document.getElementById('crH')||{}).value)||getModVal()*3;
  if(!n){toast('部屋名を入力してください');return;}
  pushHistory();
  const el={id:ST.nid++,type:'room',floor:ST.floor,roomType:'custom',label:n,icon:ic,x:getModVal(),y:getModVal(),w,h,color:'#ffeedd',locked:false};
  ST.els[ST.floor].push(el);ST.selId=el.id;
  renderCV();showPP(el);toast(ic+' '+n+' を追加しました');
}

// ════════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════════
const CV=document.getElementById('CV');
const CX=CV.getContext('2d');

function resizeCV(){
  const cw=document.getElementById('CW');
  CV.width=cw.clientWidth||window.innerWidth-220;
  CV.height=cw.clientHeight||(window.innerHeight-130);
}
window.addEventListener('resize',()=>{resizeCV();renderCV();});

function switchFloor(f){
  ST.floor=f;ST.selId=null;hidePP();
  document.getElementById('f1sw').classList.toggle('on',f===1);
  document.getElementById('f2sw').classList.toggle('on',f===2);
  renderCV();if(LP_TAB===1)buildLP(1);
}

// mm → screen px
function m2s(mm){return mm/ST.mp*ST.sc;}
function s2w(sx,sy){return{wx:(sx-ST.vx)/ST.sc*ST.mp,wy:(sy-ST.vy)/ST.sc*ST.mp};}
function snapMM(v){const M=getModVal();return Math.round(v/M)*M;}
function clampRoom(el){
  el.x=Math.max(0,Math.min(BLDG.w-el.w,el.x));
  el.y=Math.max(0,Math.min(BLDG.d-el.h,el.y));
}

function renderCV(){
  if(!CV||!CX)return;
  CX.clearRect(0,0,CV.width,CV.height);
  CX.save();
  CX.translate(ST.vx,ST.vy);
  CX.scale(ST.sc,ST.sc);
  const mp=ST.mp;
  const M=getModVal();
  const bW=BLDG.w/mp,bD=BLDG.d/mp;

  // Background
  CX.fillStyle='#f8fbff';CX.fillRect(0,0,bW,bD);

  // Grid
  CX.strokeStyle='rgba(140,185,225,.3)';CX.lineWidth=.5/ST.sc;
  for(let x=0;x<=BLDG.w;x+=M){CX.beginPath();CX.moveTo(x/mp,0);CX.lineTo(x/mp,bD);CX.stroke();}
  for(let y=0;y<=BLDG.d;y+=M){CX.beginPath();CX.moveTo(0,y/mp);CX.lineTo(bW,y/mp);CX.stroke();}

  // Building outline
  CX.strokeStyle='#5080a8';CX.lineWidth=2/ST.sc;
  CX.strokeRect(0,0,bW,bD);

  // Dimension labels on building boundary
  drawBldgDims(bW,bD,mp);

  const els=(ST.els[ST.floor]||[]);

  // ── Draw rooms ──
  els.filter(e=>e.type==='room').forEach(r=>drawRoom(r,mp));
  // ── Draw parts ──
  els.filter(e=>e.type!=='room').forEach(e=>drawPart(e,mp));

  CX.restore();
  document.getElementById('scaleBar').textContent=`1:${Math.round(ST.mp/ST.sc*100/10)*10} | ${M}mm grid | ${ST.floor}F`;
}

function drawBldgDims(bW,bD,mp){
  CX.font=`bold ${10/ST.sc}px 'Share Tech Mono',monospace`;
  CX.fillStyle='#507898';CX.textAlign='center';CX.textBaseline='bottom';
  CX.fillText(BLDG.w+'mm',bW/2,-4/ST.sc);
  CX.textAlign='left';CX.textBaseline='middle';
  CX.save();CX.translate(-14/ST.sc,bD/2);CX.rotate(-Math.PI/2);CX.fillText(BLDG.d+'mm',0,0);CX.restore();
}

function drawRoom(r,mp){
  const x=r.x/mp,y=r.y/mp,w=r.w/mp,h=r.h/mp;
  const isSel=r.id===ST.selId,isLock=LOCKED.has(r.id);
  // Shadow
  CX.shadowColor=isSel?'rgba(18,100,180,.35)':'rgba(0,0,0,.07)';
  CX.shadowBlur=isSel?12:3;CX.shadowOffsetX=1;CX.shadowOffsetY=1;
  // Fill
  CX.fillStyle=r.color||'#e0f0ff';
  CX.strokeStyle=isSel?'#1268b0':isLock?'#0a9458':'#7898b8';
  CX.lineWidth=(isSel?2.5:1.5)/ST.sc;
  CX.beginPath();CX.rect(x,y,w,h);CX.fill();CX.stroke();
  CX.shadowColor='transparent';CX.shadowBlur=0;
  // Wall hatch border
  const ht=5/ST.sc;CX.fillStyle='rgba(80,130,170,.10)';
  CX.fillRect(x,y,w,ht);CX.fillRect(x,y+h-ht,w,ht);
  CX.fillRect(x,y,ht,h);CX.fillRect(x+w-ht,y,ht,h);
  // Icon
  const isz=Math.min(w,h)*.3;
  CX.font=isz+'px serif';CX.textAlign='center';CX.textBaseline='middle';
  if(isz>4)CX.fillText(r.icon,x+w/2,y+h/2-(isLock?14:10)/ST.sc);
  // Label
  const fs=Math.max(6,Math.min(12,w*.12))/ST.sc;
  CX.font=`bold ${fs}px 'Hiragino Kaku Gothic ProN',Meiryo,sans-serif`;
  CX.fillStyle='#0e2030';CX.textBaseline='bottom';
  if(w>40/ST.sc)CX.fillText(r.label,x+w/2,y+h-3/ST.sc);
  // ── DIMENSION LABELS (always show when locked or selected) ──
  if(isSel||isLock){
    CX.font=`bold ${Math.max(7,9/ST.sc)}px 'Share Tech Mono',monospace`;
    CX.fillStyle=isLock?'#0a9458':'#1268b0';
    CX.textBaseline='top';
    // W dim
    CX.textAlign='center';
    CX.fillText('W:'+r.w,x+w/2,y+2/ST.sc);
    // D dim
    CX.textAlign='right';
    CX.fillText('D:'+r.h,x+w-2/ST.sc,y+h-12/ST.sc);
  }
  if(isLock){
    CX.font=`${10/ST.sc}px serif`;CX.fillStyle='#0a9458';CX.textAlign='center';CX.textBaseline='bottom';
    CX.fillText('🔒',x+w-8/ST.sc,y+16/ST.sc);
  }
  // Resize handle
  if(isSel&&!isLock){
    CX.fillStyle='#1268b0';
    CX.beginPath();CX.arc(x+w,y+h,6/ST.sc,0,Math.PI*2);CX.fill();
  }
}

function drawPart(el,mp){
  const x=el.x/mp,y=el.y/mp,isSel=el.id===ST.selId,isLock=LOCKED.has(el.id);
  if(el.type==='sash'){drawSash(el,x,y,mp,isSel);}
  else if(el.type==='door'){drawDoor(el,x,y,mp,isSel);}
  else if(el.type==='pillar'){drawPillar(x,y,mp,isSel);}
  else if(el.type==='stair'){drawStair(el,x,y,mp,isSel);}
  else if(el.type==='sokupan'){drawSokupan(el,x,y,mp,isSel);}
  else if(el.type==='wall'){drawWallLine(el,mp,isSel);}
  else{drawGenericPart(el,x,y,mp,isSel);}
  // Dim label for locked parts
  if(isLock||isSel){
    const w=el.w/mp,h=el.h/mp;
    CX.font=`bold ${8/ST.sc}px 'Share Tech Mono',monospace`;
    CX.fillStyle=isLock?'#0a9458':'#1268b0';
    CX.textAlign='center';CX.textBaseline='top';
    if(el.w)CX.fillText('W:'+el.w+' D:'+(el.h||'-'),x+w/2,y+2/ST.sc);
  }
}

function drawSash(el,x,y,mp,isSel){
  const w=el.w/mp,h=Math.max(el.h||100,60)/mp;
  CX.fillStyle='rgba(180,228,255,.5)';CX.strokeStyle=isSel?'#1268b0':'#0a7878';CX.lineWidth=2.5/ST.sc;
  CX.fillRect(x,y,w,h);CX.strokeRect(x,y,w,h);
  // Glass lines
  CX.strokeStyle='rgba(100,180,220,.7)';CX.lineWidth=1/ST.sc;
  for(let i=1;i<4;i++){CX.beginPath();CX.moveTo(x+w*i/4,y);CX.lineTo(x+w*i/4,y+h);CX.stroke();}
  CX.font=`bold ${8/ST.sc}px 'Share Tech Mono',monospace`;
  CX.fillStyle='#0a7878';CX.textAlign='center';CX.textBaseline='middle';
  CX.fillText('W'+el.w+'×H'+(el.h||0),x+w/2,y+h/2);
}

function drawDoor(el,x,y,mp,isSel){
  const w=el.w/mp,l=el.w/mp;
  CX.strokeStyle=isSel?'#1268b0':'#8a5020';CX.lineWidth=2/ST.sc;
  CX.fillStyle='rgba(220,190,140,.3)';
  CX.fillRect(x,y,l,8/ST.sc);CX.strokeRect(x,y,l,8/ST.sc);
  CX.beginPath();CX.arc(x,y,l,0,Math.PI/2);CX.stroke();
  CX.font=`bold ${7/ST.sc}px 'Share Tech Mono',monospace`;
  CX.fillStyle='#8a5020';CX.textAlign='center';CX.textBaseline='top';
  CX.fillText('W'+el.w,x+l/2,y+10/ST.sc);
}

function drawPillar(x,y,mp,isSel){
  const s=105/mp;
  CX.fillStyle='#b0c0d0';CX.strokeStyle=isSel?'#1268b0':'#6080a0';CX.lineWidth=1/ST.sc;
  CX.fillRect(x-s/2,y-s/2,s,s);CX.strokeRect(x-s/2,y-s/2,s,s);
  CX.strokeStyle='#80a0b8';CX.lineWidth=.5/ST.sc;
  CX.beginPath();CX.moveTo(x-s/2,y-s/2);CX.lineTo(x+s/2,y+s/2);CX.moveTo(x+s/2,y-s/2);CX.lineTo(x-s/2,y+s/2);CX.stroke();
}

function drawStair(el,x,y,mp,isSel){
  const w=el.w/mp,h=el.h/mp;
  const st=el.stairType||'choku';
  CX.fillStyle='rgba(220,208,240,.7)';CX.strokeStyle=isSel?'#1268b0':'#8060b0';CX.lineWidth=1.5/ST.sc;
  CX.fillRect(x,y,w,h);CX.strokeRect(x,y,w,h);
  // Step lines
  const steps=st==='3mawari'?13:st==='2mawari'?13:10;
  CX.strokeStyle='rgba(120,80,180,.5)';CX.lineWidth=.8/ST.sc;
  for(let i=1;i<steps;i++){CX.beginPath();CX.moveTo(x,y+h*i/steps);CX.lineTo(x+w,y+h*i/steps);CX.stroke();}
  // Arrow
  CX.strokeStyle='#8060b0';CX.lineWidth=1.5/ST.sc;
  CX.beginPath();CX.moveTo(x+w/2,y+h-5/ST.sc);CX.lineTo(x+w/2,y+5/ST.sc);CX.stroke();
  CX.font=`${8/ST.sc}px 'Hiragino Kaku Gothic ProN'`;CX.fillStyle='#8060b0';CX.textAlign='center';CX.textBaseline='top';
  const stLabel={choku:'直段','2mawari':'2段廻','3mawari':'3段廻'}[st]||'階段';
  CX.fillText(stLabel,x+w/2,y+2/ST.sc);
}

function drawSokupan(el,x,y,mp,isSel){
  const w=el.w/mp,h=Math.max(el.h||200,60)/mp;
  CX.fillStyle='rgba(200,220,200,.5)';CX.strokeStyle=isSel?'#1268b0':'#407040';CX.lineWidth=1.5/ST.sc;
  CX.fillRect(x,y,w,h);CX.strokeRect(x,y,w,h);
  // Diagonal hatch
  CX.strokeStyle='rgba(60,110,60,.3)';CX.lineWidth=.6/ST.sc;
  for(let i=-h;i<w;i+=12/ST.sc){CX.beginPath();CX.moveTo(x+i,y);CX.lineTo(x+i+h,y+h);CX.stroke();}
  CX.font=`bold ${7/ST.sc}px 'Share Tech Mono',monospace`;CX.fillStyle='#407040';CX.textAlign='center';CX.textBaseline='middle';
  CX.fillText('直側板 L'+el.w,x+w/2,y+h/2);
}

function drawWallLine(el,mp,isSel){
  CX.strokeStyle=isSel?'#1268b0':'#203848';CX.lineWidth=8/ST.sc;CX.lineCap='round';
  CX.beginPath();CX.moveTo(el.x1/mp,el.y1/mp);CX.lineTo(el.x2/mp,el.y2/mp);CX.stroke();
}

function drawGenericPart(el,x,y,mp,isSel){
  const w=el.w/mp,h=(el.h||900)/mp;
  CX.fillStyle=el.color||'#e0e8f0';CX.strokeStyle=isSel?'#1268b0':'#6080a0';CX.lineWidth=1.5/ST.sc;
  CX.fillRect(x,y,w,h);CX.strokeRect(x,y,w,h);
  CX.font=`${Math.min(Math.max(7,w*.12),12)/ST.sc}px serif`;CX.textAlign='center';CX.textBaseline='middle';
  CX.fillText(el.icon||'📦',x+w/2,y+h/2);
}

// ════════════════════════════════════════════════
//  CANVAS INTERACTIONS
// ════════════════════════════════════════════════
var DR={on:false,swx:0,swy:0,el:null};
var PAN={on:false,sx:0,sy:0,ovx:0,ovy:0};
var RSZ={on:false,el:null,ow:0,oh:0,smx:0,smy:0};
var WALL_S=null;

function hitEl(wx,wy,types=['room']){
  const els=(ST.els[ST.floor]||[]).filter(e=>types.includes(e.type));
  for(let i=els.length-1;i>=0;i--){
    const e=els[i];
    if(wx>=e.x&&wx<=e.x+e.w&&wy>=e.y&&wy<=e.y+(e.h||900))return e;
  }return null;
}
function hitAny(wx,wy){
  const els=ST.els[ST.floor]||[];
  for(let i=els.length-1;i>=0;i--){
    const e=els[i];if(e.type==='wall')continue;
    if(wx>=e.x&&wx<=e.x+e.w&&wy>=e.y&&wy<=e.y+(e.h||120))return e;
  }return null;
}

CV.addEventListener('pointerdown',e=>{
  e.preventDefault();
  hideCtx();
  const rect=CV.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const{wx,wy}=s2w(mx,my);

  if(ST.tool==='sel'||ST.tool==='move'){
    const hit=hitAny(wx,wy);
    if(hit){
      if(LOCKED.has(hit.id)){toast('🔒 固定中です。ツールバーで解除してください');return;}
      // Resize handle check
      if(hit.id===ST.selId){
        const rx=(hit.x+hit.w)/ST.mp*ST.sc+ST.vx,ry=(hit.y+(hit.h||900))/ST.mp*ST.sc+ST.vy;
        if(Math.abs(mx-rx)<12&&Math.abs(my-ry)<12){RSZ={on:true,el:hit,ow:hit.w,oh:hit.h||900,smx:mx,smy:my};return;}
      }
      pushHistory();
      ST.selId=hit.id;DR={on:true,swx:wx-hit.x,swy:wy-hit.y,el:hit};
      showPP(hit);
    }else{
      ST.selId=null;hidePP();
      PAN={on:true,sx:e.clientX,sy:e.clientY,ovx:ST.vx,ovy:ST.vy};
    }
    renderCV();
  }else if(ST.tool==='door'){
    const hit=hitAny(wx,wy);
    pushHistory();
    const el={id:ST.nid++,type:'door',floor:ST.floor,label:'ドア',icon:'🚪',x:wx,y:wy,w:DOOR_W[0],h:DOOR_H[0],color:'#d8c8a0',locked:false};
    ST.els[ST.floor].push(el);ST.selId=el.id;showPP(el);toast('ドア配置');renderCV();
  }else if(ST.tool==='win'){
    pushHistory();
    const el={id:ST.nid++,type:'sash',floor:ST.floor,label:'サッシ',icon:'🪟',x:wx,y:wy,w:SASH_W[3],h:SASH_H[3],color:'#c8e8ff',locked:false};
    ST.els[ST.floor].push(el);ST.selId=el.id;showPP(el);toast('サッシ配置');renderCV();
  }else if(ST.tool==='col'){
    pushHistory();
    ST.els[ST.floor].push({id:ST.nid++,type:'pillar',floor:ST.floor,x:snapMM(wx),y:snapMM(wy),w:105,h:105,label:'柱',icon:'⬛',locked:false});
    toast('柱追加');renderCV();
  }else if(ST.tool==='wall'){
    if(!WALL_S){
      WALL_S={x:snapMM(wx),y:snapMM(wy)};
      showHint('終点をタップして壁を確定');
    }else{
      pushHistory();
      ST.els[ST.floor].push({id:ST.nid++,type:'wall',floor:ST.floor,x1:WALL_S.x,y1:WALL_S.y,x2:snapMM(wx),y2:snapMM(wy),x:WALL_S.x,y:WALL_S.y,w:0,h:0,label:'壁',icon:'▬'});
      WALL_S=null;hideHint();toast('壁追加');renderCV();
    }
  }else if(ST.tool==='del'){
    const hit=hitAny(wx,wy);
    if(hit){pushHistory();ST.els[ST.floor]=ST.els[ST.floor].filter(e=>e.id!==hit.id);ST.selId=null;hidePP();toast('削除');renderCV();}
  }
});

CV.addEventListener('pointermove',e=>{
  e.preventDefault();
  const rect=CV.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const{wx,wy}=s2w(mx,my);
  if(PAN.on){ST.vx=PAN.ovx+(e.clientX-PAN.sx);ST.vy=PAN.ovy+(e.clientY-PAN.sy);renderCV();}
  if(DR.on&&DR.el){
    DR.el.x=snapMM(wx-DR.swx);DR.el.y=snapMM(wy-DR.swy);
    clampRoom(DR.el);renderCV();
  }
  if(RSZ.on&&RSZ.el){
    const dx=(mx-RSZ.smx)/ST.sc*ST.mp,dy=(my-RSZ.smy)/ST.sc*ST.mp;
    const M=getModVal();
    RSZ.el.w=Math.max(M,snapMM(RSZ.ow+dx));RSZ.el.h=Math.max(M,snapMM(RSZ.oh+dy));
    renderCV();
  }
});
CV.addEventListener('pointerup',()=>{DR.on=false;PAN.on=false;RSZ.on=false;});
CV.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:.88;
  const rect=CV.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const bx=(mx-ST.vx)/ST.sc,by=(my-ST.vy)/ST.sc;
  ST.sc=Math.max(.06,Math.min(8,ST.sc*f));
  ST.vx=mx-bx*ST.sc;ST.vy=my-by*ST.sc;renderCV();
},{passive:false});
CV.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const rect=CV.getBoundingClientRect();
  const{wx,wy}=s2w(e.clientX-rect.left,e.clientY-rect.top);
  const hit=hitAny(wx,wy);
  if(hit){ST.selId=hit.id;renderCV();showCtx(e.clientX,e.clientY);}
});

function setTool(t){
  ST.tool=t;WALL_S=null;hideHint();
  document.querySelectorAll('#TB .tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('t_'+t)?.classList.add('on');
  CV.style.cursor=t==='sel'?'default':t==='del'?'crosshair':t==='move'?'move':'crosshair';
}
function resetView(){ST.sc=1;ST.vx=20;ST.vy=20;renderCV();}

// ════════════════════════════════════════════════
//  LOCK / UNLOCK
// ════════════════════════════════════════════════
function lockSelected(){
  if(!ST.selId){toast('部屋を選択してください');return;}
  if(LOCKED.has(ST.selId)){LOCKED.delete(ST.selId);toast('🔓 固定解除しました');}
  else{LOCKED.add(ST.selId);toast('🔒 固定しました！図面上に寸法を表示します');}
  renderCV();
}
function unlockAll(){LOCKED.clear();toast('全ての固定を解除しました');renderCV();}

// ════════════════════════════════════════════════
//  PROPS PANEL
// ════════════════════════════════════════════════
function showPP(el){
  const pp=document.getElementById('PP'),ptitle=document.getElementById('ppTitle');
  const grid=document.getElementById('ppGrid'),btns=document.getElementById('ppBtns');
  pp.style.display='block';
  ptitle.innerHTML=`${el.icon} <b>${el.label}</b> ${LOCKED.has(el.id)?'🔒':''}`;
  const M=getModVal();
  let fieldsHTML='';
  if(el.type==='room'||el.type==='part'||el.type==='stair'||el.type==='sokupan'){
    fieldsHTML+=`<div class="pp-field"><label>幅 W(mm)</label><input type="number" step="${M}" value="${el.w}" onchange="updEl(${el.id},'w',+this.value)"></div>`;
    fieldsHTML+=`<div class="pp-field"><label>奥行 D(mm)</label><input type="number" step="${M}" value="${el.h||0}" onchange="updEl(${el.id},'h',+this.value)"></div>`;
  }else if(el.type==='sash'){
    fieldsHTML+=`<div class="pp-field"><label>幅 W(mm)</label><select onchange="updEl(${el.id},'w',+this.value)">
      ${SASH_W.map(v=>`<option value="${v}" ${v===el.w?'selected':''}>${v}</option>`).join('')}
      <option value="custom">カスタム</option></select></div>`;
    fieldsHTML+=`<div class="pp-field"><label>高さ H(mm)</label><select onchange="updEl(${el.id},'h',+this.value)">
      ${SASH_H.map(v=>`<option value="${v}" ${v===el.h?'selected':''}>${v}</option>`).join('')}
      <option value="custom">カスタム</option></select></div>`;
    fieldsHTML+=`<div class="pp-field"><label>幅カスタム</label><input type="number" placeholder="mm" onchange="if(+this.value>0)updEl(${el.id},'w',+this.value)"></div>`;
    fieldsHTML+=`<div class="pp-field"><label>高さカスタム</label><input type="number" placeholder="mm" onchange="if(+this.value>0)updEl(${el.id},'h',+this.value)"></div>`;
  }else if(el.type==='door'){
    fieldsHTML+=`<div class="pp-field"><label>幅 W(mm)</label><select onchange="updEl(${el.id},'w',+this.value)">
      ${DOOR_W.map(v=>`<option value="${v}" ${v===el.w?'selected':''}>${v}</option>`).join('')}
      <option value="custom">カスタム</option></select></div>`;
    fieldsHTML+=`<div class="pp-field"><label>高さ H(mm)</label><select onchange="updEl(${el.id},'h',+this.value)">
      ${DOOR_H.map(v=>`<option value="${v}" ${v===el.h?'selected':''}>${v}</option>`).join('')}
      <option value="custom">カスタム</option></select></div>`;
    fieldsHTML+=`<div class="pp-field"><label>幅カスタム</label><input type="number" placeholder="mm" onchange="if(+this.value>0)updEl(${el.id},'w',+this.value)"></div>`;
  }
  fieldsHTML+=`<div class="pp-field"><label>X(mm)</label><input type="number" step="${M}" value="${el.x}" onchange="updEl(${el.id},'x',+this.value)"></div>`;
  fieldsHTML+=`<div class="pp-field"><label>Y(mm)</label><input type="number" step="${M}" value="${el.y}" onchange="updEl(${el.id},'y',+this.value)"></div>`;
  grid.innerHTML=fieldsHTML;
  btns.innerHTML=`
    <button class="pp-btn lock" onclick="lockSelected()">${LOCKED.has(el.id)?'🔓 解除':'🔒 固定'}</button>
    <button class="pp-btn" onclick="dupEl(${el.id})">📋 複製</button>
    <button class="pp-btn" onclick="addDoorEl(${el.id})">🚪</button>
    <button class="pp-btn" onclick="addWinEl(${el.id})">🪟</button>
    <button class="pp-btn" onclick="addColsEl(${el.id})">⬛柱</button>
    <button class="pp-btn" onclick="aiSuggestEl(${el.id})">🤖AI</button>
    <button class="pp-btn del" onclick="delEl(${el.id})">🗑</button>`;
}
function hidePP(){document.getElementById('PP').style.display='none';}
function getEl(id){return(ST.els[ST.floor]||[]).find(e=>e.id===id);}
function updEl(id,k,v){const el=getEl(id);if(!el||LOCKED.has(id))return;el[k]=k==='w'||k==='h'?snapMM(v):v;renderCV();}
function delEl(id){pushHistory();ST.els[ST.floor]=ST.els[ST.floor].filter(e=>e.id!==id);ST.selId=null;hidePP();toast('削除');renderCV();}
function dupEl(id){
  const el=getEl(id);if(!el)return;pushHistory();
  const M=getModVal();
  const copy={...el,id:ST.nid++,x:el.x+M,y:el.y+M};
  ST.els[ST.floor].push(copy);ST.selId=copy.id;showPP(copy);renderCV();toast('複製しました');
}
function addDoorEl(id){const el=getEl(id);if(!el)return;pushHistory();ST.els[ST.floor].push({id:ST.nid++,type:'door',floor:ST.floor,label:'ドア',icon:'🚪',x:el.x+el.w/2,y:el.y+el.h,w:DOOR_W[0],h:DOOR_H[0],color:'#d8c8a0',locked:false});toast('ドア追加');renderCV();}
function addWinEl(id){const el=getEl(id);if(!el)return;pushHistory();ST.els[ST.floor].push({id:ST.nid++,type:'sash',floor:ST.floor,label:'サッシ',icon:'🪟',x:el.x,y:el.y+el.h/2,w:SASH_W[3],h:SASH_H[2],color:'#c8e8ff',locked:false});toast('窓追加');renderCV();}
function addColsEl(id){
  const el=getEl(id);if(!el)return;pushHistory();
  [[el.x,el.y],[el.x+el.w,el.y],[el.x,el.y+el.h],[el.x+el.w,el.y+el.h]].forEach(([x,y])=>{
    ST.els[ST.floor].push({id:ST.nid++,type:'pillar',floor:ST.floor,x,y,w:105,h:105,label:'柱',icon:'⬛',locked:false});
  });
  toast('四隅に柱追加');renderCV();
}

async function aiSuggestEl(id){
  const el=getEl(id);if(!el)return;
  openAI();aiSendMsg(`${ST.floor}階「${el.label}」(W${el.w}mm×D${el.h}mm)の改善提案を3点お願いします。モジュール${getModVal()}mm。`);
}

// ════════════════════════════════════════════════
//  AI GENERATE
// ════════════════════════════════════════════════
async function aiGenBoth(useSearch){
  const ta=document.getElementById('lpAITA');
  const prompt=ta?ta.value.trim():'';
  if(!prompt){toast('要望を入力してください');return;}
  showLoad(useSearch?'Google検索+Gemini解析中…':'Gemini 2.5 Flash 解析中…','1F・2Fを最適設計します');
  const M=getModVal();
  const sys=`あなたは日本の木造住宅専門AI建築士です。ユーザー要望を解析し1F・2F間取りをJSONで返してください。
モジュール:${M}mm　建物幅:${BLDG.w}mm　奥行:${BLDG.d}mm
1F部屋タイプ:${ROOMS_1F.map(r=>r.t+':'+r.l).join(',')}
2F部屋タイプ:${ROOMS_2F.map(r=>r.t+':'+r.l).join(',')}
JSONのみ返答:{"f1":[{"type":"t","label":"名","icon":"絵文字","w":mm,"h":mm,"color":"#hex","x":mm,"y":mm}...],"f2":[...]}
ルール:w・hは${M}の倍数。x・yで建物内に収まるよう配置。動線・採光考慮。`;
  try{
    const resp=await callGemini(sys+'\n\nユーザー要望:'+prompt,useSearch);
    const m=resp.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('JSON取得失敗');
    const d=JSON.parse(m[0]);
    pushHistory();
    if(d.f1){ST.els[1]=[];d.f1.forEach(r=>{const rt=ROOMS_1F.find(x=>x.t===r.type)||{c:'#e0f0ff'};ST.els[1].push({id:ST.nid++,type:'room',floor:1,roomType:r.type,label:r.label,icon:r.icon,x:r.x||M,y:r.y||M,w:r.w,h:r.h,color:r.color||rt.c,locked:false});});}
    if(d.f2){ST.els[2]=[];d.f2.forEach(r=>{const rt=ROOMS_2F.find(x=>x.t===r.type)||{c:'#e0f0ff'};ST.els[2].push({id:ST.nid++,type:'room',floor:2,roomType:r.type,label:r.label,icon:r.icon,x:r.x||M,y:r.y||M,w:r.w,h:r.h,color:r.color||rt.c,locked:false});});}
    hideLoad();renderCV();
    toast('✅ AI生成完了! 1F:'+ST.els[1].filter(e=>e.type==='room').length+'室 / 2F:'+ST.els[2].filter(e=>e.type==='room').length+'室');
  }catch(ex){hideLoad();toast('❌ エラー: '+ex.message);}
}

// ════════════════════════════════════════════════
//  AI CHAT
// ════════════════════════════════════════════════
var AI={mode:'a',hist:[],busy:false};
function setAM(m){AI.mode=m;['a','s','c'].forEach(k=>document.getElementById('am_'+k).classList.toggle('on',k===m));}
function openAI(){document.getElementById('AIP').classList.add('on');if(!document.getElementById('aiMsgs').children.length)appendAI('b','こんにちは！AI建築士です。間取り・法規・コストなど何でも。');}
function closeAI(){document.getElementById('AIP').classList.remove('on');}
function aiQ(q){aiSendMsg(q);}
function appendAI(role,text){
  const m=document.getElementById('aiMsgs');
  const d=document.createElement('div');d.className='amsg '+(role==='b'?'b':'u');
  const av=document.createElement('div');av.className='aav';av.textContent=role==='b'?'🏛':'👤';
  const bub=document.createElement('div');bub.className='abub';bub.textContent=text;
  d.appendChild(av);d.appendChild(bub);m.appendChild(d);m.scrollTop=m.scrollHeight;
}
function appendTyping(){
  const m=document.getElementById('aiMsgs');
  const d=document.createElement('div');d.className='amsg b';
  d.innerHTML='<div class="aav">🤖</div><div class="abub"><div class="dots"><span></span><span></span><span></span></div></div>';
  m.appendChild(d);m.scrollTop=m.scrollHeight;return d;
}
async function aiSend(){const ta=document.getElementById('aiTA'),t=ta.value.trim();if(!t||AI.busy)return;ta.value='';ta.style.height='';aiSendMsg(t);}
async function aiSendMsg(text){
  if(AI.busy)return;appendAI('u',text);AI.hist.push({role:'u',c:text});
  const typ=appendTyping();AI.busy=true;
  const f1=ST.els[1].filter(e=>e.type==='room').map(r=>r.label+'(W'+r.w+'D'+r.h+')').join('、');
  const f2=ST.els[2].filter(e=>e.type==='room').map(r=>r.label+'(W'+r.w+'D'+r.h+')').join('、');
  const ctx=`【現在の間取り】モジュール:${getModVal()}mm 幅:${BLDG.w} 奥行:${BLDG.d}\n1F:${f1}\n2F:${f2}`;
  const sys={a:'あなたは日本の木造住宅専門の建築士AIです。具体的・実践的に。',s:'建築・住宅の最新情報をGoogle検索で調べて回答。',c:'建築計算専門AI。面積・坪・材料費など正確に。'}[AI.mode];
  try{
    const hist=AI.hist.slice(-6).map(h=>h.role+':'+h.c).join('\n');
    const resp=await callGemini(sys+'\n'+ctx+'\n会話:\n'+hist+'\nユーザー:'+text,AI.mode==='s');
    typ.remove();AI.hist.push({role:'b',c:resp});appendAI('b',resp);
  }catch(ex){typ.remove();appendAI('b','⚠️ エラー: '+ex.message);}
  AI.busy=false;
}

// ════════════════════════════════════════════════
//  VOICE
// ════════════════════════════════════════════════
var VR=null,VA=false,VT='',VB='';
function startVoice(tid,bid){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){toast('Chrome推奨（音声入力非対応）');return;}
  if(VA){VR?.stop();return;}
  VT=tid;VB=bid;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  VR=new SR();VR.lang='ja-JP';VR.continuous=false;VR.interimResults=true;
  VR.onstart=()=>{VA=true;const b=document.getElementById(VB);if(b){b.classList.add('rec');b.textContent='⏹';}toast('🎤 音声入力中…');};
  VR.onresult=e=>{const ta=document.getElementById(VT);if(ta)ta.value=Array.from(e.results).map(r=>r[0].transcript).join('');};
  VR.onend=()=>{VA=false;const b=document.getElementById(VB);if(b){b.classList.remove('rec');b.textContent='🎤';}toast('音声入力完了');};
  VR.start();
}
